services:
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: noshirvani
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: noshirvani-api
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/noshirvani?sslmode=disable
      - REDIS_ADDR=redis:6379
      - ENVIRONMENT=development
      - SMSIR_API_KEY=${SMSIR_API_KEY:-}
      - SMSIR_TEMPLATE_ID=${SMSIR_TEMPLATE_ID:-}
      - JWT_SECRET=super-secret-key-change-in-production
      - JWT_REFRESH_SECRET=refresh-secret
      - JWT_ACCESS_TTL=3600
      - JWT_REFRESH_TTL=1296000
      - OTP_PROVIDER=${OTP_PROVIDER:-mock}
      - EXPOSE_MOCK_OTP=${EXPOSE_MOCK_OTP:-true}
      - UPLOAD_PATH=/uploads
      - SERVER_ADDR=:8080
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://localhost,http://127.0.0.1
      - ADMIN_PHONES=09123456789
    volumes:
      - uploads:/uploads
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: noshirvani-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro,z
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  redis_data:
  uploads:
