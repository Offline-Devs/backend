      parameters:
      - description: اطلاعات پروفایل
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/internal_handler.CompleteProfileInput'
      produces:
      - application/json
      responses:
        "200":
          description: پروفایل با موفقیت ایجاد/بروزرسانی شد
          schema:
            $ref: '#/definitions/github_com_yourusername_noshirvani-academy_backend_internal_domain.Student'
        "400":
          description: درخواست نامعتبر
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "401":
          description: عدم اجازه دسترسی
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: خطای سرور
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: تکمیل یا بروزرسانی پروفایل دانشجو
      tags:
      - دانشجویان
  /students/statistics:
    get:
      description: آمار کامل عملکرد دانشجو در آزمون‌ها را دریافت می‌کند
      parameters:
      - description: تاریخ شروع (جلالی canonical YYYY/MM/DD)
        in: query
        name: from
        type: string
      - description: تاریخ پایان (جلالی canonical YYYY/MM/DD)
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: آمار عملکرد
          schema:
            $ref: '#/definitions/internal_handler.ExamStatistics'
        "401":
          description: عدم اجازه دسترسی
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "404":
          description: پروفایل دانشجو یافت نشد
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: خطای سرور
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: دریافت آمار عملکرد دانشجو
      tags:
      - آمار
  /subjects:
    get:
      description: لیست دروس مرتبط با یک رشته تحصیلی را دریافت می‌کند
      parameters:
      - description: نام رشته (ریاضی، تجربی، انسانی)
        in: query
        name: major
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: لیست دروس
          schema:
            $ref: '#/definitions/internal_handler.SubjectConfig'
        "400":
          description: رشته نامعتبر
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      summary: دریافت دروس بر اساس رشته
      tags:
      - دروس
  /upload:
    post:
      consumes:
      - multipart/form-data
      description: آپلود تصویر پروفایل یا فایل‌های مستندات
      parameters:
      - description: فایل برای آپلود
        in: formData
        name: file
        required: true
        type: file
      - default: document
        description: نوع فایل (profile, document)
        in: query
        name: type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: فایل با موفقیت آپلود شد
          schema:
            $ref: '#/definitions/internal_handler.UploadResponse'
        "400":
          description: درخواست نامعتبر یا فایل خیلی بزرگ است
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "401":
          description: عدم اجازه دسترسی
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: خطای سرور
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: آپلود فایل
      tags:
      - آپلود
  /upload/multiple:
    post:
      consumes:
      - multipart/form-data
      description: آپلود همزمان چندین فایل
      parameters:
      - description: فایل‌ها برای آپلود
        in: formData
        name: files
        required: true
        type: file
      - default: document
        description: نوع فایل (profile, document)
        in: query
        name: type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: فایل‌ها با موفقیت آپلود شدند
          schema:
            items:
              $ref: '#/definitions/internal_handler.UploadResponse'
            type: array
        "400":
          description: درخواست نامعتبر
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "401":
          description: عدم اجازه دسترسی
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: خطای سرور
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: آپلود چند فایل
      tags:
      - آپلود
securityDefinitions:
  BearerAuth:
    description: '"توکن JWT - فرمت: Bearer <token>"'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
