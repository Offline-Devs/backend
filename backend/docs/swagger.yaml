externalDocs:
  description: توضیحات API
  url: https://github.com/Offline-Devs/noshirvani-academy
info:
  contact:
    email: support@noshirvaniacademy.com
    name: تیم توسعه اپلیکیشن
    url: https://github.com/Offline-Devs
  description: |-
    API برای سیستم مدیریت آکادمی نوشیروانی
    شامل خدماتی برای احراز هویت، مدیریت دانشجویان، آزمون‌ها، اشتباهات و مقالات بلاگ
  license:
    name: MIT License
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: نوشیروانی آکادمی API
  version: "1.0"
paths:
  /admin/dynamic-fields:
    get:
      description: فیلدهای سفارشی را برای یک موجودیت دریافت می‌کند (فقط برای مدیران)
      parameters:
      - description: نوع موجودیت (اختیاری)
        in: query
        name: entity_type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: لیست فیلدهای سفارشی
          schema:
            items:
              $ref: '#/definitions/github_com_yourusername_noshirvani-academy_backend_internal_domain.DynamicFieldDefinition'
            type: array
        "401":
          description: عدم اجازه دسترسی
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: خطای سرور
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: دریافت فیلدهای سفارشی
      tags:
      - مدیریت
    post:
      consumes:
      - application/json
      description: یک فیلد سفارشی جدید ایجاد می‌کند (فقط برای مدیران)
      parameters:
      - description: اطلاعات فیلد سفارشی
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/internal_handler.CreateDynamicFieldInput'
      produces:
      - application/json
      responses:
        "201":
          description: فیلد با موفقیت ایجاد شد
          schema:
            $ref: '#/definitions/github_com_yourusername_noshirvani-academy_backend_internal_domain.DynamicFieldDefinition'
        "400":
          description: درخواست نامعتبر
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "401":
          description: عدم اجازه دسترسی
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: خطای سرور
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: ایجاد فیلد سفارشی
      tags:
      - مدیریت
  /admin/dynamic-fields/{id}:
    delete:
      description: یک فیلد سفارشی را حذف می‌کند (فقط برای مدیران)
      parameters:
      - description: شناسه فیلد
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: فیلد با موفقیت حذف شد
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: عدم اجازه دسترسی
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: خطای سرور
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: حذف فیلد سفارشی
      tags:
      - مدیریت
    put:
      consumes:
      - application/json
      description: یک فیلد سفارشی را بروزرسانی می‌کند (فقط برای مدیران)
      parameters:
      - description: شناسه فیلد
        in: path
        name: id
        required: true
        type: string
      - description: اطلاعات جدید فیلد
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/internal_handler.CreateDynamicFieldInput'
      produces:
      - application/json
      responses:
        "200":
          description: فیلد با موفقیت بروزرسانی شد
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: درخواست نامعتبر
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "401":
          description: عدم اجازه دسترسی
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: خطای سرور
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: بروزرسانی فیلد سفارشی
      tags:
      - مدیریت
  /admin/performance/{id}:
    delete:
      description: مدیر می‌تواند رکورد عملکرد را حذف کند
      parameters:
      - description: شناسه رکورد عملکرد
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: رکورد با موفقیت حذف شد
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: عدم اجازه دسترسی
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: خطای سرور
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: حذف رکورد عملکرد (مدیر)
      tags:
      - مدیریت
    put:
      consumes:
      - application/json
      description: مدیر می‌تواند رکورد عملکرد دانشجو را بروزرسانی کند
      parameters:
      - description: شناسه رکورد عملکرد
        in: path
        name: id
        required: true
        type: string
      - description: اطلاعات جدید
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/internal_handler.UpdatePerformanceInput'
      produces:
      - application/json
      responses:
        "200":
          description: رکورد با موفقیت بروزرسانی شد
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: درخواست نامعتبر
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "401":
          description: عدم اجازه دسترسی
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: خطای سرور
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: بروزرسانی رکورد عملکرد (مدیر)
      tags:
      - مدیریت
  /admin/students:
    get:
      description: لیست تمام دانشجویان را دریافت می‌کند (فقط برای مدیران)
      produces:
      - application/json
      responses:
        "200":
          description: لیست دانشجویان
          schema:
            items:
              $ref: '#/definitions/github_com_yourusername_noshirvani-academy_backend_internal_domain.Student'
            type: array
        "401":
          description: عدم اجازه دسترسی
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: خطای سرور
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: دریافت لیست دانشجویان
      tags:
      - مدیریت
  /admin/students/{id}:
    delete:
      description: یک دانشجو و تمام اطلاعات مرتبط آن را حذف می‌کند (فقط برای مدیران)
      parameters:
